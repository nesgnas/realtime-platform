apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: realtime-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nesgnas/realtime-platform.git
    targetRevision: main
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: realtime-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
