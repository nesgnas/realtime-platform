apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-backend
  namespace: realtime-platform
spec:
  replicas: 2
  selector:
    matchLabels: {app: realtime-backend}
  template:
    metadata:
      labels: {app: realtime-backend}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ghcr.io/OWNER/realtime-platform-backend:CHANGE_ME
          envFrom:
            - configMapRef: {name: realtime-platform}
            - secretRef: {name: realtime-platform-secrets}
          ports:
            - {name: http, containerPort: 4000}
          readinessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 20
            periodSeconds: 10
          lifecycle:
            preStop: {exec: {command: [sh, -c, "sleep 5"]}}
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-backend
  namespace: realtime-platform
spec:
  selector: {app: realtime-backend}
  ports:
    - {name: http, port: 4000, targetPort: http}
---
# Headless DNS records allow libcluster DNSPoll to discover all BEAM nodes.
apiVersion: v1
kind: Service
metadata:
  name: realtime-backend-headless
  namespace: realtime-platform
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: {app: realtime-backend}
  ports:
    - {name: epmd, port: 4369, targetPort: 4369}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: realtime-backend
  namespace: realtime-platform
spec:
  minAvailable: 1
  selector:
    matchLabels: {app: realtime-backend}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: realtime-backend
  namespace: realtime-platform
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: realtime-backend}
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 70}
