# Optional example. TURN generally needs a public static IP and UDP-aware LoadBalancer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: realtime-platform
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: coturn}
  template:
    metadata:
      labels: {app: coturn}
    spec:
      containers:
        - name: coturn
          image: coturn/coturn:4.6.3-alpine
          args:
            - --no-cli
            - --log-file=stdout
            - --fingerprint
            - --lt-cred-mech
            - --realm=$(TURN_REALM)
            - --user=$(TURN_USER):$(TURN_PASSWORD)
            - --external-ip=$(TURN_EXTERNAL_IP)
            - --min-port=49160
            - --max-port=49200
          envFrom:
            - configMapRef: {name: realtime-platform}
            - secretRef: {name: realtime-platform-secrets}
          ports:
            - {name: turn-udp, containerPort: 3478, protocol: UDP}
            - {name: turn-tcp, containerPort: 3478, protocol: TCP}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
---
# This exposes signaling only. Provider-specific configuration or host networking
# is required to expose the relay range (49160-49200/UDP) reliably.
apiVersion: v1
kind: Service
metadata:
  name: coturn
  namespace: realtime-platform
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector: {app: coturn}
  ports:
    - {name: turn-udp, port: 3478, targetPort: turn-udp, protocol: UDP}
    - {name: turn-tcp, port: 3478, targetPort: turn-tcp, protocol: TCP}
