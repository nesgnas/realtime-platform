apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: realtime-platform
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app: coturn}
  template:
    metadata:
      labels: {app: coturn}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: coturn
          image: coturn/coturn:4.6.3-alpine
          args:
            - --no-cli
            - --log-file=stdout
            - --fingerprint
            - --lt-cred-mech
            - --realm=$(TURN_REALM)
            - --user=$(TURN_USER):$(TURN_PASSWORD)
            - --external-ip=$(TURN_EXTERNAL_IP)
            - --min-port=$(TURN_MIN_PORT)
            - --max-port=$(TURN_MAX_PORT)
          envFrom:
            - configMapRef: {name: realtime-platform}
            - secretRef: {name: realtime-platform-secrets}
          ports:
            - {name: turn-udp, containerPort: 3478, protocol: UDP}
            - {name: turn-tcp, containerPort: 3478, protocol: TCP}
          readinessProbe:
            tcpSocket: {port: turn-tcp}
            initialDelaySeconds: 3
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
