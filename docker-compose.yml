name: realtime-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-realtime_platform_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env}
      GUARDIAN_SECRET: ${GUARDIAN_SECRET:?Set GUARDIAN_SECRET in .env}
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: "4000"
      PHX_SERVER: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DNS_CLUSTER_QUERY: ""
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-ws://localhost:4000/socket}
        VITE_ICE_SERVERS: ${VITE_ICE_SERVERS:?Set VITE_ICE_SERVERS in .env}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  coturn:
    image: coturn/coturn:4.6.3-alpine
    profiles: ["turn"]
    command:
      - --no-cli
      - --log-file=stdout
      - --fingerprint
      - --lt-cred-mech
      - --realm=${TURN_REALM:-localhost}
      - --user=${TURN_USER:-realtime}:${TURN_PASSWORD:?Set TURN_PASSWORD in .env}
      - --external-ip=${TURN_EXTERNAL_IP:?Set TURN_EXTERNAL_IP in .env}
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}:${TURN_MIN_PORT:-49160}-${TURN_MAX_PORT:-49200}/udp"
    restart: unless-stopped

volumes:
  postgres_data:
